<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHAT TO WEAR — 个人电子衣橱</title>
  <style>
    :root { --ink:#111; --paper:#f7f7f5; --line:#d9d9d5; --muted:#6f6f69; --accent:#e7ff49; }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(rgba(247,247,245,.84),rgba(247,247,245,.91)),url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=2200&q=82') center/cover fixed; color:var(--ink); font-family:Arial, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing:.01em; }
    button, input, select { font:inherit; }
    button { cursor:pointer; }
    .page { max-width:1440px; margin:auto; padding:0 4vw 60px; }
    header { min-height:88px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--ink); }
    .brand { font-size:clamp(22px,3vw,37px); font-weight:800; letter-spacing:-.08em; line-height:1; }
    .brand small { display:block; margin-top:8px; font-size:10px; font-weight:400; letter-spacing:.16em; }
    .date { font-size:11px; text-align:right; line-height:1.7; color:var(--muted); letter-spacing:.08em; }
    .sync-button { margin-top:7px; padding:0; border:0; background:transparent; color:var(--ink); font-size:10px; letter-spacing:.08em; text-decoration:underline; }
    .sync-dot { display:inline-block; width:6px; height:6px; margin-right:5px; border-radius:50%; background:#aaa; }
    .sync-dot.online { background:#74a319; }
    .weather { display:grid; grid-template-columns:1.05fr .95fr; min-height:360px; border-bottom:1px solid var(--ink); }
    .weather-main { padding:45px 45px 45px 0; border-right:1px solid var(--line); display:flex; flex-direction:column; justify-content:space-between; }
    .eyebrow, .section-label { font-size:10px; letter-spacing:.17em; text-transform:uppercase; color:var(--muted); }
    .temperature { margin:22px 0 0; font-size:clamp(74px,12vw,150px); font-weight:300; letter-spacing:-.1em; line-height:.8; }
    .weather-desc { margin-top:16px; font-size:17px; }
    .place { margin-top:9px; font-size:11px; color:var(--muted); }
    .weather-tip { padding:45px 0 45px 45px; display:flex; flex-direction:column; justify-content:space-between; }
    .weather-tip h1 { max-width:470px; margin:20px 0; font-weight:400; font-size:clamp(25px,3.5vw,48px); letter-spacing:-.07em; line-height:1.1; }
    .tip-note { max-width:440px; padding-top:15px; border-top:1px solid var(--ink); font-size:13px; line-height:1.7; }
    .wardrobe-head { display:flex; justify-content:space-between; align-items:end; padding:80px 0 24px; }
    .wardrobe-head h2 { margin:8px 0 0; font-size:clamp(31px,4vw,52px); font-weight:400; letter-spacing:-.07em; }
    .count { font-size:11px; color:var(--muted); }
    .categories { border-top:1px solid var(--ink); border-left:1px solid var(--ink); }
    .department { border-right:1px solid var(--ink); border-bottom:1px solid var(--ink); background:rgba(247,247,245,.64); }
    .department-head { padding:19px 20px; display:flex; justify-content:space-between; border-bottom:1px solid var(--ink); }
    .department-head h3 { margin:0; font-size:25px; font-weight:400; letter-spacing:-.06em; }
    .filter-tabs { display:flex; gap:22px; overflow-x:auto; padding:0 20px; border-bottom:1px solid var(--line); scrollbar-width:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .filter-tab { flex:0 0 auto; padding:15px 0 12px; border:0; border-bottom:2px solid transparent; background:transparent; color:#8a8a84; font-size:12px; }
    .filter-tab.active { border-color:var(--ink); color:var(--ink); font-weight:700; }
    .wardrobe-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); }
    .category { min-height:300px; padding:20px; border-right:1px solid var(--line); display:flex; flex-direction:column; }
    .category-title { display:flex; justify-content:space-between; gap:10px; align-items:baseline; }
    .category h3 { margin:0; font-size:20px; font-weight:400; letter-spacing:-.05em; }
    .category-num { font-size:11px; color:var(--muted); }
    .cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:22px; }
    .card { position:relative; min-width:0; background:#ecece8; }
    .card img { display:block; width:100%; aspect-ratio:3/4; object-fit:cover; }
    .card-info { padding:9px 8px 10px; font-size:11px; background:#fff; }
    .card-name { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .card-meta { margin-top:4px; color:var(--muted); font-size:10px; }
    .card-actions { display:flex; gap:5px; margin-top:8px; }
    .mini-btn { padding:0; border:0; background:transparent; color:var(--ink); text-decoration:underline; font-size:10px; }
    .add-btn { margin-top:auto; width:100%; padding:12px 7px; background:transparent; border:1px solid var(--ink); text-align:left; font-size:11px; letter-spacing:.05em; transition:.2s; }
    .add-btn:hover { background:var(--ink); color:#fff; }
    .add-card { min-height:235px; margin:0; padding:18px; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; background:rgba(255,255,255,.24); border:0; border-right:1px solid var(--line); color:var(--ink); text-align:left; font-size:12px; letter-spacing:.05em; transition:.2s; }
    .add-card span { display:block; margin-bottom:auto; font-size:30px; font-weight:300; }
    .add-card:hover { background:var(--ink); color:#fff; }
    dialog { width:min(560px,calc(100% - 28px)); padding:0; border:0; background:#fff; box-shadow:0 20px 80px rgba(0,0,0,.24); }
    dialog::backdrop { background:rgba(0,0,0,.48); }
    .modal-head { padding:22px 25px; border-bottom:1px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
    .modal-head h2 { margin:0; font-size:22px; font-weight:400; }
    .close { background:none; border:0; font-size:25px; line-height:1; }
    form { padding:25px; }
    .upload-area { display:block; margin-bottom:22px; padding:25px; text-align:center; background:#f0f0ed; border:1px dashed #999; font-size:12px; }
    #preview { display:none; width:100%; max-height:250px; object-fit:contain; margin:0 0 18px; background:#eee; }
    .fields { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
    label { display:grid; gap:7px; font-size:10px; letter-spacing:.1em; }
    input, select { width:100%; padding:9px 0; background:none; border:0; border-bottom:1px solid var(--line); outline:none; font-size:13px; }
    input:focus, select:focus { border-color:var(--ink); }
    .submit { width:100%; margin-top:28px; padding:14px; border:1px solid var(--ink); background:var(--ink); color:white; font-size:12px; letter-spacing:.09em; }
    .detail-image { display:block; width:100%; max-height:390px; object-fit:contain; background:#eee; }
    .detail-content { padding:24px 25px 30px; }
    .detail-content h3 { margin:0 0 20px; font-size:25px; font-weight:400; }
    .details { display:grid; grid-template-columns:repeat(2,1fr); margin:0; border-top:1px solid var(--line); }
    .details div { padding:11px 0; border-bottom:1px solid var(--line); }
    .details dt { font-size:9px; letter-spacing:.1em; color:var(--muted); }
    .details dd { margin:5px 0 0; font-size:13px; }
    .empty { grid-column:1/-1; padding:16px 0; font-size:11px; color:var(--muted); }
    .wardrobe-grid .empty { grid-column:auto; min-height:235px; padding:20px; display:flex; align-items:flex-end; border-right:1px solid var(--line); }
    footer { padding-top:50px; font-size:10px; color:var(--muted); letter-spacing:.1em; }
    @media (max-width:800px) { body { background-attachment:scroll; } .weather { grid-template-columns:1fr; } .weather-main { border-right:0; border-bottom:1px solid var(--line); padding:32px 0; min-height:265px; } .weather-tip { padding:32px 0; min-height:245px; } .category { min-height:280px; } .wardrobe-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:480px) { .page { padding:0 18px 40px; } header { min-height:75px; } .date { font-size:9px; } .wardrobe-head { padding-top:55px; } .fields { grid-template-columns:1fr; gap:13px; } .weather-tip h1 { font-size:31px; } }
  </style>
</head>
<body>
  <main class="page">
    <header><div class="brand">WHAT TO WEAR<small>PERSONAL DIGITAL WARDROBE</small></div><div class="date"><div id="dateText"></div><button class="sync-button" type="button" onclick="openAuthDialog()"><span class="sync-dot" id="syncDot"></span><span id="syncText">本机衣橱</span></button></div></header>
    <section class="weather">
      <div class="weather-main"><div><div class="eyebrow">TODAY'S WEATHER</div><div class="temperature" id="temperature">--°</div><div class="weather-desc" id="condition">正在获取天气</div></div><div class="place" id="place">定位中…</div></div>
      <div class="weather-tip"><div><div class="eyebrow">EDITOR'S WEATHER NOTE</div><h1 id="outfit">正在为你准备今日的穿衣建议。</h1></div><p class="tip-note" id="tip">允许位置权限可获得更准确的本地天气；若不可用，将显示上海天气。</p></div>
    </section>
    <section class="wardrobe-head"><div><div class="section-label">MY WARDROBE / 5 DEPARTMENTS</div><h2>衣橱目录</h2></div><div class="count" id="total">0 PIECES</div></section>
    <section class="categories" id="categories"></section>
    <footer>WHAT TO WEAR © 2026 · YOUR CLOTHES, YOUR EDIT</footer>
  </main>

  <dialog id="itemDialog"><div class="modal-head"><h2 id="formTitle">添加衣物</h2><button class="close" type="button" onclick="itemDialog.close()">×</button></div><form id="itemForm">
    <input id="imageInput" type="file" accept="image/*" required hidden>
    <label class="upload-area" for="imageInput" id="uploadText">点击选择服装图片<br><small>图片将压缩后保存在本机浏览器</small></label><img id="preview" alt="衣物预览">
    <div class="fields"><label>分类<select id="categoryInput" required></select></label><label>名称<input name="name" required placeholder="例如：羊毛西装外套"></label><label>颜色<input name="color" required placeholder="例如：深灰"></label><label>季节<select name="season" required><option value="春夏">春夏</option><option value="夏季">夏季</option><option value="秋冬">秋冬</option><option value="四季">四季</option></select></label><label>风格<input name="style" required placeholder="例如：极简通勤"></label><label>购入价格（元）<input name="price" type="number" min="0" step="0.01" required placeholder="0"></label><label>穿搭场景<input name="occasion" required placeholder="例如：上班 / 约会"></label></div>
    <button class="submit" type="submit">保存至衣橱</button>
  </form></dialog>
  <dialog id="detailDialog"><div class="modal-head"><h2>衣物详情</h2><button class="close" type="button" onclick="detailDialog.close()">×</button></div><div id="detailBody"></div></dialog>
  <dialog id="authDialog"><div class="modal-head"><h2>云端衣橱同步</h2><button class="close" type="button" onclick="authDialog.close()">×</button></div><form id="authForm">
    <p class="tip-note" style="margin:0 0 22px;max-width:none">在手机与电脑登录同一邮箱账号后，衣物资料和图片会自动实时同步。</p>
    <div class="fields"><label>邮箱<input id="authEmail" type="email" required placeholder="name@example.com"></label><label>密码<input id="authPassword" type="password" required minlength="6" placeholder="至少 6 位"></label></div>
    <button class="submit" id="authSubmit" type="submit">登录云端衣橱</button><button class="mini-btn" id="signupButton" type="button" style="margin-top:16px">没有账号？创建账号</button><button class="mini-btn" id="signoutButton" type="button" style="display:none;margin-top:16px">退出当前账号</button>
  </form></dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 衣物数据以 Base64 图片及字段一起保存，完全在本机浏览器内运行。
    // 五个主衣橱分区；上装与下装保留 ZARA 商品逻辑的细分类。
    const departments = [
      {name:'上装', subs:['外套','上衣','T恤','衬衫','针织','卫衣','内衣']},
      {name:'下装', subs:['裤子','半裙']},
      {name:'连衣裙', subs:['连衣裙']},
      {name:'鞋履', subs:['鞋履']},
      {name:'配饰', subs:['配饰']}
    ];
    const activeFilters = { '上装':'全部', '下装':'全部' };
    const storageKey = 'what-to-wear-items-v1';
    let items = JSON.parse(localStorage.getItem(storageKey) || '[]');
    let pendingImage = '';
    // Supabase 公开客户端配置：权限由数据库的 RLS 策略和登录用户控制。
    const supabaseUrl = 'https://wronnonmxfctmdslvbvj.supabase.co';
    const supabaseKey = 'sb_publishable_eSqLnAMUw0WJA2FX323RCA_yFr8exk8';
    const supabaseClient = window.supabase?.createClient(supabaseUrl, supabaseKey);
    let currentUser = null;
    let realtimeChannel = null;
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    $('dateText').textContent = new Intl.DateTimeFormat('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).format(new Date()).replaceAll('年','年 ').replaceAll('月','月 ');

    function save() { localStorage.setItem(storageKey, JSON.stringify(items)); }
    function setSyncStatus(text, online=false) { $('syncText').textContent=text; $('syncDot').classList.toggle('online',online); }
    function render() {
      $('categories').innerHTML = departments.map(dept => {
        const departmentCount = items.filter(x => dept.subs.includes(x.category)).length;
        const active = activeFilters[dept.name] || '全部';
        const list = items.filter(x => active === '全部' ? dept.subs.includes(x.category) : x.category === active);
        const tabs = dept.subs.length > 1 ? `<div class="filter-tabs">${['全部',...dept.subs].map(cat => `<button class="filter-tab ${cat===active?'active':''}" onclick="setFilter('${dept.name}','${cat}')">${cat}</button>`).join('')}</div>` : '';
        const cards = list.map(x => `<div class="card"><img src="${x.image}" alt="${esc(x.name)}"><div class="card-info"><div class="card-name">${esc(x.name)}</div><div class="card-meta">${esc(x.category)} · ${esc(x.color)}</div><div class="card-actions"><button class="mini-btn" onclick="showDetail('${x.id}')">详情</button><button class="mini-btn" onclick="removeItem('${x.id}')">删除</button></div></div></div>`).join('');
        const addLabel = active === '全部' ? `添加${dept.name}单品` : `添加${active}`;
        return `<section class="department"><div class="department-head"><h3>${dept.name}</h3><span class="category-num">${String(departmentCount).padStart(2,'0')} PIECES</span></div>${tabs}<div class="wardrobe-grid">${cards || '<div class="empty">尚未收录</div>'}<button class="add-card" onclick="openAddForDepartment(\'${dept.name}\')"><span>＋</span>${addLabel}</button></div></section>`;
      }).join('');
      $('total').textContent = `${items.length} PIECE${items.length === 1 ? '' : 'S'}`;
    }
    function setFilter(department, category) { activeFilters[department] = category; render(); }
    function openAddForDepartment(name) { const dept=departments.find(d=>d.name===name); const active=activeFilters[name] || '全部'; const options=active==='全部' ? dept.subs : [active]; openAdd(options); }
    function openAdd(options) { $('itemForm').reset(); pendingImage=''; $('preview').style.display='none'; $('uploadText').style.display='block'; $('categoryInput').innerHTML=options.map(category=>`<option value="${category}">${category}</option>`).join(''); $('formTitle').textContent=options.length===1 ? `添加 · ${options[0]}` : '添加衣物'; $('itemDialog').showModal(); }
    async function removeItem(id) { if (!confirm('确定从衣橱中删除这件衣物吗？')) return; const item=items.find(x=>x.id===id); items=items.filter(x=>x.id!==id); save(); render(); if (currentUser && supabaseClient && item?.cloudPath) { const {error}=await supabaseClient.from('wardrobe_items').delete().eq('id',id); if (error) { alert('云端删除失败：'+error.message); await loadCloudItems(); return; } await supabaseClient.storage.from('wardrobe-images').remove([item.cloudPath]); } }
    function showDetail(id) { const x=items.find(i=>i.id===id); if (!x) return; $('detailBody').innerHTML=`<img class="detail-image" src="${x.image}" alt="${esc(x.name)}"><div class="detail-content"><h3>${esc(x.name)}</h3><dl class="details"><div><dt>分类</dt><dd>${esc(x.category)}</dd></div><div><dt>颜色</dt><dd>${esc(x.color)}</dd></div><div><dt>季节</dt><dd>${esc(x.season)}</dd></div><div><dt>风格</dt><dd>${esc(x.style)}</dd></div><div><dt>购入价格</dt><dd>¥ ${esc(x.price)}</dd></div><div><dt>穿搭场景</dt><dd>${esc(x.occasion)}</dd></div></dl></div>`; $('detailDialog').showModal(); }
    // 上传时压缩图片，减少 LocalStorage 配额占用。
    $('imageInput').addEventListener('change', e => { const file=e.target.files[0]; if (!file) return; const reader=new FileReader(); reader.onload=ev=>{ const img=new Image(); img.onload=()=>{ const max=900, ratio=Math.min(1,max/Math.max(img.width,img.height)); const canvas=document.createElement('canvas'); canvas.width=img.width*ratio; canvas.height=img.height*ratio; canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height); pendingImage=canvas.toDataURL('image/jpeg',.82); $('preview').src=pendingImage; $('preview').style.display='block'; $('uploadText').style.display='none'; }; img.src=ev.target.result; }; reader.readAsDataURL(file); });
    $('itemForm').addEventListener('submit', async e => { e.preventDefault(); if (!pendingImage) return alert('请先选择服装图片。'); const d=new FormData(e.currentTarget), id=crypto.randomUUID(), item={ id, category:$('categoryInput').value, image:pendingImage, name:d.get('name'), color:d.get('color'), season:d.get('season'), style:d.get('style'), price:d.get('price'), occasion:d.get('occasion') }; items.unshift(item); try { save(); } catch { items.shift(); return alert('浏览器存储空间不足，请上传更小的图片或删除部分衣物。'); } $('itemDialog').close(); render(); if (currentUser && supabaseClient) { try { const cloudPath=`${currentUser.id}/${id}.jpg`; const blob=await (await fetch(pendingImage)).blob(); const upload=await supabaseClient.storage.from('wardrobe-images').upload(cloudPath,blob,{contentType:'image/jpeg'}); if (upload.error) throw upload.error; const imageUrl=supabaseClient.storage.from('wardrobe-images').getPublicUrl(cloudPath).data.publicUrl; const insert=await supabaseClient.from('wardrobe_items').insert({id,user_id:currentUser.id,category:item.category,image_url:imageUrl,cloud_path:cloudPath,name:item.name,color:item.color,season:item.season,style:item.style,price:Number(item.price),occasion:item.occasion}); if (insert.error) throw insert.error; item.image=imageUrl; item.cloudPath=cloudPath; save(); render(); } catch (err) { alert('已暂存至本机，但云端同步失败：'+err.message); } } });
    function openAuthDialog() { $('authForm').reset(); const logged=!!currentUser; $('authSubmit').style.display=logged?'none':'block'; $('signupButton').style.display=logged?'none':'inline-block'; $('signoutButton').style.display=logged?'inline-block':'none'; $('authDialog').showModal(); }
    async function loadCloudItems() { if (!currentUser || !supabaseClient) return; const {data,error}=await supabaseClient.from('wardrobe_items').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}); if (error) { setSyncStatus('云端设置未完成'); return; } items=data.map(x=>({id:x.id,category:x.category,image:x.image_url,cloudPath:x.cloud_path,name:x.name,color:x.color,season:x.season,style:x.style,price:x.price,occasion:x.occasion})); save(); render(); setSyncStatus('云端已同步',true); }
    async function connectCloud() { if (!supabaseClient) { setSyncStatus('云端加载失败'); return; } const {data:{user}}=await supabaseClient.auth.getUser(); currentUser=user; if (!user) { setSyncStatus('登录以同步'); return; } setSyncStatus('正在同步…',true); await loadCloudItems(); if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel); realtimeChannel=supabaseClient.channel(`wardrobe-${user.id}`).on('postgres_changes',{event:'*',schema:'public',table:'wardrobe_items',filter:`user_id=eq.${user.id}`},()=>loadCloudItems()).subscribe(); }
    $('authForm').addEventListener('submit',async e=>{ e.preventDefault(); if (!supabaseClient) return alert('云端服务加载失败，请检查网络。'); const result=await supabaseClient.auth.signInWithPassword({email:$('authEmail').value,password:$('authPassword').value}); if(result.error) return alert('登录失败：'+result.error.message); currentUser=result.data.user; $('authDialog').close(); await connectCloud(); });
    $('signupButton').addEventListener('click',async()=>{ if (!supabaseClient) return alert('云端服务加载失败，请检查网络。'); const email=$('authEmail').value,password=$('authPassword').value; if(!email||password.length<6) return alert('请输入邮箱和至少 6 位密码。'); const result=await supabaseClient.auth.signUp({email,password}); if(result.error) return alert('创建失败：'+result.error.message); alert('账号已创建。若收到验证邮件，请先完成验证，再用同一邮箱密码登录其他设备。'); });
    $('signoutButton').addEventListener('click',async()=>{ await supabaseClient?.auth.signOut(); currentUser=null; if(realtimeChannel) supabaseClient.removeChannel(realtimeChannel); $('authDialog').close(); setSyncStatus('登录以同步'); });
    const weatherText={0:'晴朗',1:'大致晴朗',2:'多云',3:'阴天',45:'有雾',48:'雾凇',51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',81:'阵雨',82:'强阵雨',95:'雷雨'};
    function recommendation(temp, code) { const wet=[51,53,55,61,63,65,80,81,82,95].includes(code); let s=temp>=28?'轻薄 T 恤或背心，搭配短裤 / 半裙':temp>=21?'短袖上衣或连衣裙，备一件薄衬衫':temp>=15?'针织或衬衫叠穿，配长裤':temp>=8?'外套搭配针织内搭与长裤':'厚外套、保暖针织和围巾不可少'; return wet ? `${s}；今天有雨，别忘了防水鞋与雨具。` : `${s}。`; }
    async function fetchWeather(lat=39.9042, lon=116.4074, label='北京') { try { const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`; const res=await fetch(url); if(!res.ok) throw Error(); const data=await res.json(), cur=data.current, condition=weatherText[cur.weather_code]||'天气变化中'; $('temperature').textContent=`${Math.round(cur.temperature_2m)}°`; $('condition').textContent=condition; $('place').textContent=`${label} · 实时更新`; $('outfit').textContent=recommendation(cur.temperature_2m,cur.weather_code); $('tip').textContent=`现在 ${condition}，体感会随风力与湿度变化。根据衣橱中已有单品，自由组合出你的今日造型。`; } catch { $('temperature').textContent='--°'; $('condition').textContent='暂时无法连接天气服务'; $('place').textContent=label; $('outfit').textContent='天气服务暂不可用时，也可以先从衣橱里挑一件让你感觉自在的衣物。'; $('tip').textContent='请检查网络连接后刷新页面。'; } }
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>fetchWeather(p.coords.latitude,p.coords.longitude,'当前位置'),()=>fetchWeather(39.9042,116.4074,'北京'),{timeout:7000}); else fetchWeather(39.9042,116.4074,'北京');
    render();
    connectCloud();
  </script>
</body>
